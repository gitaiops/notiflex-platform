name: CI — build & push image

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/ci.yaml"

permissions:
  contents: read
  id-token: write   # Workload Identity Federation (키리스 OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker auth
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build & push image (SHA tag)
        run: |
          IMAGE="asia-northeast3-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/notiflex/api:sha-${GITHUB_SHA::7}"
          docker build -t "$IMAGE" app/
          docker push "$IMAGE"
          echo "pushed $IMAGE"
