apiVersion: batch/v1
kind: CronJob
metadata:
  name: notiflex-healthcheck
  namespace: notiflex
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            cloud.google.com/gke-nodepool: ops-pool
          restartPolicy: OnFailure
          containers:
            - name: healthcheck
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  code=$(curl -s -o /dev/null -w "%{http_code}" http://notiflex-api.notiflex.svc.cluster.local/health)
                  if [ "$code" = "200" ]; then
                    echo "healthcheck OK ($code)"
                  else
                    echo "healthcheck FAILED ($code)"
                    exit 1
                  fi
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
