# Tempo monolithic — ops-pool 배치 (ch8.2)
# 노드풀 taint 없음 → nodeSelector(GKE 자동 라벨)만으로 충분
tempo:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 256Mi

nodeSelector:
  cloud.google.com/gke-nodepool: ops-pool

persistence:
  enabled: false
